  <body>
    <div id="root"></div>
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          const decoded = l.search
            .slice(1)
            .split('&')
            .map((segment) => segment.replace(/~and~/g, '&'))
            .join('?');
          window.history.replaceState(null, '', l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <script type="module" src="/src/main.tsx"></script>
